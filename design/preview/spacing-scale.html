<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8"/>
<title>Spacing scale</title>
<link rel="stylesheet" href="_card.css"/>
<style>
.card { padding: 22px 28px; gap: 6px; }
.row { display: grid; grid-template-columns: 60px 1fr 60px; align-items: center; gap: 12px; padding: 5px 0; border-bottom: 1px solid var(--border-1); }
.row:last-child { border-bottom: none; }
.tok { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); }
.size { font-family: var(--font-mono); font-size: 11px; color: var(--fg-4); text-align: right; }
.bar { height: 8px; background: var(--accent); opacity: 0.85; border-radius: 1px; }
</style>
</head>
<body>
<div class="card">
  <div class="row"><span class="tok">--s-1</span><div class="bar" style="width:4px"></div><span class="size">4</span></div>
  <div class="row"><span class="tok">--s-2</span><div class="bar" style="width:8px"></div><span class="size">8</span></div>
  <div class="row"><span class="tok">--s-3</span><div class="bar" style="width:12px"></div><span class="size">12</span></div>
  <div class="row"><span class="tok">--s-4</span><div class="bar" style="width:16px"></div><span class="size">16</span></div>
  <div class="row"><span class="tok">--s-5</span><div class="bar" style="width:20px"></div><span class="size">20</span></div>
  <div class="row"><span class="tok">--s-6</span><div class="bar" style="width:24px"></div><span class="size">24</span></div>
  <div class="row"><span class="tok">--s-7</span><div class="bar" style="width:32px"></div><span class="size">32</span></div>
  <div class="row"><span class="tok">--s-8</span><div class="bar" style="width:40px"></div><span class="size">40</span></div>
  <div class="row"><span class="tok">--s-9</span><div class="bar" style="width:56px"></div><span class="size">56</span></div>
  <div class="row"><span class="tok">--s-10</span><div class="bar" style="width:80px"></div><span class="size">80</span></div>
</div>
</body>
</html>
