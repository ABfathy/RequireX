<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8"/>
<title>Requirement card</title>
<link rel="stylesheet" href="_card.css"/>
<style>
.card { padding: 20px 24px; }
.req {
  border: 1px solid var(--border-1);
  background: var(--bg-surface-1);
  border-radius: var(--r-4);
  padding: 14px 16px;
  display: flex; flex-direction: column; gap: 10px;
}
.head { display: flex; justify-content: space-between; align-items: center; gap: 10px;}
.id { font-family: var(--font-mono); font-size: 11px; color: var(--fg-4);}
.title { font-size: 14px; font-weight: 500; color: var(--fg-1); letter-spacing: -0.005em;}
.body { font-size: 13px; color: var(--fg-2); line-height: 1.55;}
.body em { color: var(--fg-1); font-style: normal; background: rgba(203,155,111,0.10); padding: 0 2px; border-radius: 2px;}
.foot { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; padding-top: 8px; border-top: 1px solid var(--border-1);}
.tag { font-family: var(--font-mono); font-size: 10px; padding: 2px 6px; border-radius: 3px; background: var(--bg-surface-2); color: var(--fg-3); border: 1px solid var(--border-1);}
.trace { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; color: var(--fg-3); margin-left: auto;}
.trace svg { width: 12px; height: 12px;}
.pill { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; padding: 2px 7px 2px 6px; border-radius: 4px; background: rgba(126,180,134,0.14); color: #b8d6bd;}
.pill .d { width: 6px; height: 6px; border-radius: 50%; background: var(--sage);}
</style>
</head>
<body>
<div class="card">
  <div class="req">
    <div class="head">
      <span class="id">REQ-0142</span>
      <span class="pill"><span class="d"></span>Approved</span>
    </div>
    <div>
      <div class="title">Payment latency under 200&nbsp;ms p99</div>
      <div class="body">The payments handler must respond within <em>200&nbsp;ms at the 99th percentile</em> under nominal load. Breaches escalate to the on-call within one minute.</div>
    </div>
    <div class="foot">
      <span class="tag">non-functional</span>
      <span class="tag">latency</span>
      <span class="tag">slo</span>
      <span class="trace">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M10 13a5 5 0 0 0 7 0l3-3a5 5 0 0 0-7-7l-1 1"/><path d="M14 11a5 5 0 0 0-7 0l-3 3a5 5 0 0 0 7 7l1-1"/></svg>
        Linked to 3 sources
      </span>
    </div>
  </div>
</div>
</body>
</html>
