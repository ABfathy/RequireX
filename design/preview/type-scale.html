<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8"/>
<title>Type scale</title>
<link rel="stylesheet" href="_card.css"/>
<style>
.card { padding: 22px 28px; gap: 4px; }
.row { display: grid; grid-template-columns: 70px 1fr 80px; gap: 16px; align-items: baseline; padding: 4px 0; border-bottom: 1px solid var(--border-1); }
.row:last-child { border-bottom: none; }
.tok { font-family: var(--font-mono); font-size: 11px; color: var(--fg-4); }
.size { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); text-align: right; }
.s-display { font-size: 32px; font-weight: 500; letter-spacing: -0.02em; color: var(--fg-1); }
.s-h1 { font-size: 24px; font-weight: 500; letter-spacing: -0.01em; color: var(--fg-1); }
.s-h2 { font-size: 20px; font-weight: 500; color: var(--fg-1); }
.s-h3 { font-size: 16px; font-weight: 500; color: var(--fg-1); }
.s-body { font-size: 14px; color: var(--fg-2); }
.s-meta { font-size: 12px; color: var(--fg-3); }
.s-eye { font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--fg-3); }
</style>
</head>
<body>
<div class="card">
  <div class="row"><span class="tok">--t-3xl</span><span class="s-display">Display</span><span class="size">32 / 1.15</span></div>
  <div class="row"><span class="tok">--t-2xl</span><span class="s-h1">Page heading</span><span class="size">24 / 1.3</span></div>
  <div class="row"><span class="tok">--t-xl</span><span class="s-h2">Dialog title</span><span class="size">20 / 1.3</span></div>
  <div class="row"><span class="tok">--t-lg</span><span class="s-h3">Section heading</span><span class="size">16 / 1.3</span></div>
  <div class="row"><span class="tok">--t-md</span><span class="s-body">Body — extracts traced to source.</span><span class="size">14 / 1.5</span></div>
  <div class="row"><span class="tok">--t-sm</span><span class="s-meta">Caption / meta</span><span class="size">12 / 1.5</span></div>
  <div class="row"><span class="tok">--t-2xs</span><span class="s-eye">Eyebrow / label</span><span class="size">10 / 1.0</span></div>
</div>
</body>
</html>
