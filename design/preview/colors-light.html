<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Light theme parity</title>
<link rel="stylesheet" href="_card.css"/>
<style>
html { background: #0d0d0f; }
.card { padding: 0; min-height: 100vh; flex-direction: row; gap: 0;}
.half { flex: 1; padding: 22px 24px; display: flex; flex-direction: column; gap: 10px;}
.dark  { background: #0d0d0f; color: #efeee9; }
.light { background: #f6f5f1; color: #1a1a1c; }
.dark .lbl,  .light .lbl { font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; opacity: 0.55; font-weight: 500;}
.title { font-size: 18px; font-weight: 500; letter-spacing: -0.01em;}
.body { font-size: 12.5px; opacity: 0.78; line-height: 1.55;}
.btn { width: fit-content; font-size: 11px; padding: 6px 11px; border-radius: 6px;}
.dark .btn  { background: #cb9b6f; color: #1b140d;}
.light .btn { background: #b07f4f; color: #fbfaf6;}
.row { display: flex; gap: 6px; align-items: center; font-size: 11px;}
.dot { width: 8px; height: 8px; border-radius: 50%;}
.dark .row span:nth-child(2) { color: #c4c4c9;}
.light .row span:nth-child(2) { color: #2f2f33;}
.mono { font-family: var(--font-mono); font-size: 11px;}
.dark .mono { color: #9b9ba2;}
.light .mono { color: #56565d;}
</style>
</head>
<body>
<div class="card">
  <div class="half dark">
    <span class="lbl">Dark</span>
    <span class="title">Trace to source</span>
    <span class="body">Every requirement keeps a hairline link back to the line of the document it came from.</span>
    <span class="btn">New requirement</span>
    <div class="row"><span class="dot" style="background:#7eb486"></span><span>Approved</span><span class="mono">REQ-0142</span></div>
  </div>
  <div class="half light">
    <span class="lbl">Light</span>
    <span class="title">Trace to source</span>
    <span class="body">Every requirement keeps a hairline link back to the line of the document it came from.</span>
    <span class="btn">New requirement</span>
    <div class="row"><span class="dot" style="background:#4f8a5a"></span><span>Approved</span><span class="mono">REQ-0142</span></div>
  </div>
</div>
</body>
</html>
