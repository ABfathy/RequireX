<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8"/>
<title>Geist — Sans</title>
<link rel="stylesheet" href="_card.css"/>
<style>
.card { padding: 26px 30px; gap: 6px; }
.spec { font-size: 56px; font-weight: 500; letter-spacing: -0.025em; line-height: 1.05; color: var(--fg-1); }
.weights { display: flex; gap: 18px; align-items: baseline; margin-top: 10px; flex-wrap: wrap; }
.w { font-size: 22px; line-height: 1.1; color: var(--fg-2); }
.lbl { font-size: 9px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--fg-4); display:block; margin-top: 2px; }
.foot { display: flex; gap: 24px; margin-top: 6px; font-family: var(--font-mono); font-size: 11px; color: var(--fg-3);}
</style>
</head>
<body>
<div class="card">
  <div class="spec">Aa Bb Cc 0123</div>
  <div class="weights">
    <div><div class="w" style="font-weight:300">Light</div><span class="lbl">300</span></div>
    <div><div class="w" style="font-weight:400">Regular</div><span class="lbl">400</span></div>
    <div><div class="w" style="font-weight:500">Medium</div><span class="lbl">500 &middot; default</span></div>
    <div><div class="w" style="font-weight:600">Semibold</div><span class="lbl">600</span></div>
    <div><div class="w" style="font-weight:700">Bold</div><span class="lbl">700</span></div>
  </div>
  <div class="foot"><span>Geist</span><span>Google Fonts</span><span>--font-sans</span></div>
</div>
</body>
</html>
