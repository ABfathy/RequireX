<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8"/>
<title>Status pills</title>
<link rel="stylesheet" href="_card.css"/>
<style>
.card { padding: 24px 28px; gap: 14px; }
.line { display: flex; gap: 8px; align-items: center; flex-wrap: wrap;}
.lbl { font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--fg-4); width: 90px; flex-shrink: 0;}
.pill {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 11px; font-weight: 500;
  padding: 3px 8px 3px 7px;
  border-radius: 4px;
  height: 20px;
  white-space: nowrap;
}
.pill .d { width: 6px; height: 6px; border-radius: 50%; }
.p-success  { background: rgba(126,180,134,0.14); color: #b8d6bd; }
.p-warning  { background: rgba(212,163,86,0.14);  color: #e8caa1; }
.p-danger   { background: rgba(196,115,106,0.14); color: #e0a9a3; }
.p-info     { background: rgba(122,155,184,0.14); color: #b4c8da; }
.p-neutral  { background: var(--bg-surface-2); color: var(--fg-3); border: 1px solid var(--border-1); }
.p-accent   { background: var(--accent-soft); color: #e0bc94; }
.p-success .d { background: var(--success);}
.p-warning .d { background: var(--warning);}
.p-danger .d  { background: var(--danger);}
.p-info .d    { background: var(--info);}
.p-neutral .d { background: var(--fg-4);}
.p-accent .d  { background: var(--accent);}
.tag { font-family: var(--font-mono); font-size: 10px; padding: 2px 6px; border-radius: 3px; background: var(--bg-surface-2); color: var(--fg-3); border: 1px solid var(--border-1);}
</style>
</head>
<body>
<div class="card">
  <div class="line"><span class="lbl">Workflow</span>
    <span class="pill p-neutral"><span class="d"></span>Draft</span>
    <span class="pill p-info"><span class="d"></span>In review</span>
    <span class="pill p-warning"><span class="d"></span>Stale</span>
    <span class="pill p-success"><span class="d"></span>Approved</span>
    <span class="pill p-danger"><span class="d"></span>Conflict</span>
  </div>
  <div class="line"><span class="lbl">Trace</span>
    <span class="pill p-accent"><span class="d"></span>Linked &middot; 3</span>
    <span class="pill p-neutral"><span class="d"></span>Unlinked</span>
    <span class="pill p-warning"><span class="d"></span>Drift detected</span>
  </div>
  <div class="line"><span class="lbl">Tags</span>
    <span class="tag">non-functional</span>
    <span class="tag">latency</span>
    <span class="tag">ISO-26262</span>
    <span class="tag">v2.1</span>
  </div>
</div>
</body>
</html>
