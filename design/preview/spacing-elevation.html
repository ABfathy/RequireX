<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8"/>
<title>Elevation</title>
<link rel="stylesheet" href="_card.css"/>
<style>
.card { padding: 36px 28px 30px; gap: 8px; }
.grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px; align-items: end; }
.box { aspect-ratio: 2/1.1; background: var(--bg-surface-2); border-radius: var(--r-4); display: grid; place-items: center; font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); }
.e1 { box-shadow: 0 1px 2px rgba(0,0,0,0.32), 0 0 0 1px rgba(0,0,0,0.4); }
.e2 { box-shadow: 0 6px 16px rgba(0,0,0,0.40), 0 2px 4px rgba(0,0,0,0.30), 0 0 0 1px rgba(0,0,0,0.5); }
.e3 { box-shadow: 0 24px 48px rgba(0,0,0,0.55), 0 8px 16px rgba(0,0,0,0.40), 0 0 0 1px rgba(0,0,0,0.5); }
.lbl { font-size: 11px; color: var(--fg-3); text-align: center; font-family: var(--font-mono); margin-top: 6px;}
</style>
</head>
<body>
<div class="card">
  <div class="grid">
    <div><div class="box e1">e1</div><div class="lbl">popover · hover</div></div>
    <div><div class="box e2">e2</div><div class="lbl">menu · palette</div></div>
    <div><div class="box e3">e3</div><div class="lbl">modal · dialog</div></div>
  </div>
</div>
</body>
</html>
