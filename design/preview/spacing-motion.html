<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8"/>
<title>Motion</title>
<link rel="stylesheet" href="_card.css"/>
<style>
.card { padding: 24px 28px; gap: 14px; }
.timing { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 10px; }
.t {
  border: 1px solid var(--border-1);
  border-radius: var(--r-4);
  background: var(--bg-surface-1);
  padding: 12px;
  display: flex; flex-direction: column; gap: 6px;
}
.t .name { font-size: 12px; color: var(--fg-2); font-weight: 500; }
.t .val  { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); }
.t .use  { font-size: 11px; color: var(--fg-3); }
.curve { background: var(--bg-surface-1); border: 1px solid var(--border-1); border-radius: var(--r-4); padding: 10px 12px; display: flex; align-items: center; gap: 14px;}
.curve svg { display: block; }
.curve .meta { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); }
.curve .meta b { color: var(--fg-2); font-weight: 500; }
</style>
</head>
<body>
<div class="card">
  <div class="curve">
    <svg width="120" height="60" viewBox="0 0 120 60">
      <path d="M0 60 C 24 60, 0 0, 120 0" stroke="#cb9b6f" stroke-width="1.6" fill="none"/>
      <line x1="0" y1="60" x2="120" y2="60" stroke="#3a3a40" stroke-width="0.5"/>
      <line x1="0" y1="0" x2="120" y2="0" stroke="#3a3a40" stroke-width="0.5"/>
    </svg>
    <div class="meta">
      <div><b>--ease-out</b></div>
      <div>cubic-bezier(0.2, 0, 0, 1)</div>
      <div>quiet ease-out · no overshoot</div>
    </div>
  </div>
  <div class="timing">
    <div class="t"><span class="name">instant</span><span class="val">80ms</span><span class="use">hover text</span></div>
    <div class="t"><span class="name">fast</span><span class="val">120ms</span><span class="use">default</span></div>
    <div class="t"><span class="name">base</span><span class="val">200ms</span><span class="use">panels</span></div>
    <div class="t"><span class="name">slow</span><span class="val">320ms</span><span class="use">modal reveal</span></div>
  </div>
</div>
</body>
</html>
