<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8"/>
<title>Geist Mono</title>
<link rel="stylesheet" href="_card.css"/>
<style>
.card { padding: 26px 30px; gap: 10px; }
.spec { font-family: var(--font-mono); font-size: 44px; font-weight: 500; line-height: 1.05; color: var(--fg-1); letter-spacing: 0;}
.lines { font-family: var(--font-mono); font-size: 13px; line-height: 1.55; color: var(--fg-2); display: flex; flex-direction: column; gap: 2px; }
.lines .k { color: var(--syn-keyword); }
.lines .s { color: var(--syn-string); }
.lines .n { color: var(--syn-number); }
.lines .c { color: var(--syn-comment); }
.lines .f { color: var(--syn-fn); }
.foot { display: flex; gap: 24px; font-family: var(--font-mono); font-size: 11px; color: var(--fg-3);}
</style>
</head>
<body>
<div class="card">
  <div class="spec">REQ-0142</div>
  <div class="lines">
    <span><span class="c">// extracted from spec.pdf p.12</span></span>
    <span><span class="k">const</span> <span class="f">limit</span> = <span class="n">200</span>;</span>
    <span><span class="k">if</span> (<span class="f">latency</span> &gt; <span class="n">limit</span>) <span class="k">throw</span> <span class="s">"slo-breach"</span>;</span>
  </div>
  <div class="foot"><span>Geist Mono</span><span>tabular-nums</span><span>--font-mono</span></div>
</div>
</body>
</html>
