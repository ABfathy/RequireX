<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8"/>
<title>Syntax palette</title>
<link rel="stylesheet" href="_card.css"/>
<style>
.card { padding: 22px 28px; gap: 12px;}
.editor {
  background: var(--bg-surface-1);
  border: 1px solid var(--border-1);
  border-radius: var(--r-4);
  padding: 14px 16px 14px 8px;
  font-family: var(--font-mono);
  font-size: 12.5px;
  line-height: 1.65;
  display: grid;
  grid-template-columns: 26px 1fr;
  column-gap: 10px;
}
.gut { color: var(--fg-4); text-align: right; user-select: none;}
.line { color: var(--fg-2); white-space: pre; }
.k { color: var(--syn-keyword);}
.s { color: var(--syn-string);}
.n { color: var(--syn-number);}
.c { color: var(--syn-comment);}
.f { color: var(--syn-fn);}
.t { color: var(--syn-type);}
.p { color: var(--syn-punct);}
.legend { display: flex; gap: 14px; flex-wrap: wrap; font-family: var(--font-mono); font-size: 10px;}
.legend span span:first-child { display:inline-block; width: 8px; height: 8px; border-radius: 2px; margin-right: 6px; vertical-align: middle;}
</style>
</head>
<body>
<div class="card">
  <div class="editor">
    <span class="gut">12</span><span class="line"><span class="c">// REQ-0142 from payments-spec.pdf §3.4</span></span>
    <span class="gut">13</span><span class="line"><span class="k">export function</span> <span class="f">checkLatency</span><span class="p">(</span><span class="t">Request</span> req<span class="p">)</span> <span class="p">{</span></span>
    <span class="gut">14</span><span class="line">  <span class="k">const</span> threshold <span class="p">=</span> <span class="n">200</span><span class="p">;</span> <span class="c">// p99 ms</span></span>
    <span class="gut">15</span><span class="line">  <span class="k">if</span> <span class="p">(</span>req.elapsed <span class="p">&gt;</span> threshold<span class="p">)</span> <span class="k">throw</span> <span class="k">new</span> <span class="t">SLOError</span><span class="p">(</span><span class="s">"breach"</span><span class="p">)</span><span class="p">;</span></span>
    <span class="gut">16</span><span class="line"><span class="p">}</span></span>
  </div>
  <div class="legend">
    <span><span style="background:#b48cc4"></span>keyword</span>
    <span><span style="background:#a3c293"></span>string</span>
    <span><span style="background:#d8a373"></span>number</span>
    <span><span style="background:#88a8c9"></span>function</span>
    <span><span style="background:#c9b078"></span>type</span>
    <span><span style="background:#6a6a72"></span>comment</span>
  </div>
</div>
</body>
</html>
