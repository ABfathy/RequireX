<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8"/>
<title>Logo</title>
<link rel="stylesheet" href="_card.css"/>
<style>
.card { padding: 28px 32px; gap: 24px; }
.lock { display: flex; align-items: center; gap: 14px; }
.lock svg { color: var(--fg-1); }
.wmark { font-size: 36px; font-weight: 500; letter-spacing: -0.02em; color: var(--fg-1); }
.mark-mono { color: var(--accent); }
.swatches { display: flex; gap: 10px; }
.sw { width: 64px; height: 64px; border-radius: var(--r-4); display: grid; place-items: center; border: 1px solid var(--border-1); }
.sw svg { width: 32px; height: 32px; }
.sw.dark { background: var(--neutral-1); color: var(--fg-1); }
.sw.amber { background: var(--neutral-1); color: var(--accent); }
.sw.paper { background: var(--neutral-13); color: #1a1a1c; border-color: var(--neutral-12);}
.sw.line { background: transparent; color: var(--fg-2); }
.sw.fav  { background: transparent; padding: 0; }
.sw.fav svg { width: 64px; height: 64px; border-radius: var(--r-4); }
</style>
</head>
<body>
<div class="card">
  <div class="lock">
    <svg width="44" height="44" viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round" stroke-linecap="round">
      <path d="M5 25 L16 6 L27 25"/>
      <path d="M10.2 18 L21.8 18" stroke-width="1.4"/>
      <circle cx="16" cy="6" r="0.9" fill="currentColor" stroke="none"/>
    </svg>
    <span class="wmark">Axiom</span>
  </div>
  <div class="swatches">
    <div class="sw dark" title="On surface">
      <svg viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round" stroke-linecap="round"><path d="M5 25 L16 6 L27 25"/><path d="M10.2 18 L21.8 18" stroke-width="1.4"/><circle cx="16" cy="6" r="0.9" fill="currentColor" stroke="none"/></svg>
    </div>
    <div class="sw amber" title="Accent">
      <svg viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round" stroke-linecap="round"><path d="M5 25 L16 6 L27 25"/><path d="M10.2 18 L21.8 18" stroke-width="1.4"/><circle cx="16" cy="6" r="0.9" fill="currentColor" stroke="none"/></svg>
    </div>
    <div class="sw paper" title="On paper">
      <svg viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round" stroke-linecap="round"><path d="M5 25 L16 6 L27 25"/><path d="M10.2 18 L21.8 18" stroke-width="1.4"/><circle cx="16" cy="6" r="0.9" fill="currentColor" stroke="none"/></svg>
    </div>
    <div class="sw line" title="Hairline">
      <svg viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round" stroke-linecap="round"><path d="M5 25 L16 6 L27 25"/><path d="M10.2 18 L21.8 18"/><circle cx="16" cy="6" r="0.7" fill="currentColor" stroke="none"/></svg>
    </div>
    <div class="sw fav" title="App icon"><img src="../assets/favicon.svg" width="64" height="64" alt=""/></div>
  </div>
</div>
</body>
</html>
