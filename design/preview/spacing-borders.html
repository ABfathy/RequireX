<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8"/>
<title>Borders</title>
<link rel="stylesheet" href="_card.css"/>
<style>
.card { padding: 24px 28px; gap: 12px;}
.row { display: grid; grid-template-columns: 110px 1fr 90px; align-items: center; gap: 14px;}
.tok { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); }
.hex { font-family: var(--font-mono); font-size: 10px; color: var(--fg-4); text-align: right; }
.line { height: 28px; background: var(--bg-surface-1); border-radius: 4px; display: flex; align-items: center; padding: 0 12px; font-size: 12px; color: var(--fg-2);}
.b1  { border: 1px solid var(--border-1);}
.b2  { border: 1px solid var(--border-2);}
.bs  { border: 1px solid var(--border-strong);}
.dash { border: 1px dashed var(--border-2);}
.focus { border: 1px solid var(--border-1); box-shadow: 0 0 0 2px var(--bg-app), 0 0 0 3.5px var(--accent-ring);}
</style>
</head>
<body>
<div class="card">
  <div class="row"><span class="tok">--border-1</span><div class="line b1">Hairline (default)</div><span class="hex">#1f1f23</span></div>
  <div class="row"><span class="tok">--border-2</span><div class="line b2">Subtle stronger</div><span class="hex">#2a2a2f</span></div>
  <div class="row"><span class="tok">--border-strong</span><div class="line bs">Emphasis (rare)</div><span class="hex">#3a3a40</span></div>
  <div class="row"><span class="tok">dashed</span><div class="line dash">Empty / drop zone</div><span class="hex">--border-2</span></div>
  <div class="row"><span class="tok">focus</span><div class="line focus">Focus ring on input</div><span class="hex">accent · 55%</span></div>
</div>
</body>
</html>
