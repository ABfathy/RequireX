    <!-- ── Project Sidebar ──────────────────────────────────── -->

    <!-- ── Doc View ─────────────────────────────────────────── -->
    <script type="text/babel">
      const { useState: useDvSt, useRef: useDvRef } = React;

      const STATUS_TONE = {
        approved: "success",
        "in-review": "info",
        draft: "neutral",
        conflict: "danger",
        stale: "warning",
      };
      const STATUS_LABEL = {
        approved: "Approved",
        "in-review": "In review",
        draft: "Draft",
        conflict: "Conflict",
        stale: "Stale",
      };
      const SRC_ICON = {
        doc: "DocLines",
        transcript: "Mic",
        ticket: "Ticket",
        code: "Code",
      };

      function wrapText(text, max = 70) {
        const words = text.split(" ");
        const lines = [];
        let cur = "";
        for (const w of words) {
          if (cur && (cur + " " + w).length > max) {
            lines.push(cur);
            cur = w;
          } else {
            cur = cur ? cur + " " + w : w;
          }
        }
        if (cur) lines.push(cur);
        return lines;
      }

      function buildDocLines(reqs) {
        const lines = [];
        let n = 1;
        const add = (obj) => lines.push({ ...obj, lineNum: n++ });
        add({
          type: "h1",
          text: "Payment Service v2 — Requirements Specification",
        });
        add({ type: "blank" });
        add({
          type: "meta",
          text: "payments-v2  ·  spec/v2.1  ·  6 requirements",
        });
        add({ type: "blank" });
        const sections = [...new Set(reqs.map((r) => r.section))];
        for (const section of sections) {
          const sReqs = reqs.filter((r) => r.section === section);
          add({ type: "h2", text: section });
          add({ type: "blank", small: true });
          for (const req of sReqs) {
            add({
              type: "req-header",
              reqId: req.id,
              status: req.status,
              tags: req.tags,
            });
            add({ type: "req-title", reqId: req.id, text: req.title });
            add({ type: "blank", small: true });
            const chunks = wrapText(req.body);
            chunks.forEach((chunk, i) =>
              add({
                type: "body",
                reqId: req.id,
                text: chunk,
                evidence: i === chunks.length - 1 ? req.evidence : null,
              }),
            );
            add({ type: "blank" });
          }
          add({ type: "blank" });
        }
        return lines;
      }

      const EvidenceBit = ({ ev }) => {
        const [show, setShow] = useDvSt(false);
        const src = (window.SOURCES || []).find((s) => s.id === ev.sourceId);
        if (!src) return null;
        const I = Icon[SRC_ICON[src.type]] || Icon.DocLines;
        return (
          <span
            className="ev-bit"
            onMouseEnter={() => setShow(true)}
            onMouseLeave={() => setShow(false)}
          >
            <I size={10} />
            <span>{ev.ref}</span>
            {show && (
              <span className="ev-tooltip">
                <span className="ev-tooltip-src">{src.name}</span>
                <span className="ev-tooltip-quote">{ev.quote}</span>
              </span>
            )}
          </span>
        );
      };

      const DocLine = ({ line, selectedReq, onSelectReq }) => {
        const isReq = !!line.reqId;
        const isActive = isReq && line.reqId === selectedReq;
        const cls = [
          "doc-line",
          `is-${line.type}`,
          isActive ? "req-active" : "",
          line.small ? "is-small" : "",
          isReq ? "is-req-group" : "",
        ]
          .filter(Boolean)
          .join(" ");
        return (
          <div
            className={cls}
            onClick={isReq ? () => onSelectReq(line.reqId) : undefined}
          >
            <div className="dl-num">
              {line.type !== "blank" ? line.lineNum : ""}
            </div>
            <div className="dl-content">
              {(line.type === "h1" ||
                line.type === "h2" ||
                line.type === "meta" ||
                line.type === "req-title") && <span>{line.text}</span>}
              {line.type === "req-header" && (
                <>
                  <span className="req-line-id mono">{line.reqId}</span>
                  <Pill tone={STATUS_TONE[line.status]}>
                    {STATUS_LABEL[line.status]}
                  </Pill>
                  <span className="dl-spread" />
                  <span className="dl-tag-row">
                    {line.tags.slice(0, 2).map((t) => (
                      <Tag key={t}>{t}</Tag>
                    ))}
                  </span>
                </>
              )}
              {line.type === "body" && (
                <>
                  <span>{line.text}</span>
                  {line.evidence &&
                    line.evidence.map((ev, i) => (
                      <EvidenceBit key={i} ev={ev} />
                    ))}
                </>
              )}
            </div>
          </div>
        );
      };

      const DocView = ({ selectedReq, onSelectReq }) => {
        const { REQS } = window;
        const [chatVal, setChatVal] = useDvSt("");
        const [chatLog, setChatLog] = useDvSt([]);
        const docLines = buildDocLines(REQS);

        const sendMsg = () => {
          if (!chatVal.trim()) return;
          const msg = chatVal.trim();
          setChatVal("");
          setChatLog((l) => [...l, { role: "user", text: msg }]);
          setTimeout(
            () =>
              setChatLog((l) => [
                ...l,
                { role: "ai", text: "Processing your request…" },
              ]),
            700,
          );
        };

        return (
          <div className="doc-view">
            <div className="doc-topbar">
              <div className="doc-crumbs">
                <span>payments-v2</span>
                <span className="doc-crumb-sep">/</span>
                <span>requirements</span>
                <span className="doc-crumb-sep">/</span>
                <span className="doc-crumb-last">spec-v2.1</span>
              </div>
              <div className="doc-topbar-actions">
                <Btn kind="ghost" size="sm" leading={<Icon.Filter size={12} />}>
                  Filter
                </Btn>
                <Btn kind="ghost" size="sm" leading={<Icon.Trace size={12} />}>
                  Trace
                </Btn>
                <Btn
                  kind="primary"
                  size="sm"
                  leading={<Icon.Download size={12} />}
                >
                  Export
                </Btn>
              </div>
            </div>

            <div className="doc-scroll">
              {docLines.map((line, i) => (
                <DocLine
                  key={i}
                  line={line}
                  selectedReq={selectedReq}
                  onSelectReq={onSelectReq}
                />
              ))}
              <div style={{ height: 32 }} />
            </div>

            <div className="chatbar">
              <div className="chatbar-input-row">
                <Icon.MessageSq
                  size={14}
                  style={{ color: "var(--fg-4)", flexShrink: 0 }}
                />
                <input
                  className="chatbar-input"
                  placeholder="Ask about requirements, request changes, upload sources…"
                  value={chatVal}
                  onChange={(e) => setChatVal(e.target.value)}
                  onKeyDown={(e) => {
                    if (e.key === "Enter" && !e.shiftKey) {
                      e.preventDefault();
                      sendMsg();
                    }
                  }}
                />
                <IconBtn title="Attach source" onClick={() => {}}>
                  <Icon.Upload />
                </IconBtn>
                <IconBtn title="Send" onClick={sendMsg}>
                  <Icon.Send />
                </IconBtn>
              </div>
            </div>
          </div>
        );
      };

      Object.assign(window, {
        DocView,
        STATUS_TONE,
        STATUS_LABEL,
        buildDocLines,
      });
    </script>

    <!-- ── Right Pane ───────────────────────────────────────── -->
    <script type="text/babel">
      const RightPane = ({ activeTab, onTabChange }) => {
        const { SOURCES, CHAT_MSGS, REVISIONS } = window;
        const srcIconMap = {
          doc: "DocLines",
          transcript: "Mic",
          ticket: "Ticket",
          code: "Code",
        };
        const tabs = ["Sources", "Chat", "Revisions"];

        return (
          <aside className="right-pane">
            <div className="rp-tabs">
              {tabs.map((t) => (
                <button
                  key={t}
                  className={
                    "rp-tab" +
                    (activeTab === t.toLowerCase() ? " is-active" : "")
                  }
                  onClick={() => onTabChange(t.toLowerCase())}
                >
                  {t}
                </button>
              ))}
            </div>

            <div className="rp-content">
              {activeTab === "sources" && (
                <>
                  <div className="rp-section-label">Ingested sources</div>
                  {SOURCES.map((src) => {
                    const I = Icon[srcIconMap[src.type]] || Icon.DocLines;
                    return (
                      <div key={src.id} className="source-row">
                        <I size={14} />
                        <div className="source-row-info">
                          <div className="source-row-name">{src.name}</div>
                          <div className="source-row-meta">{src.meta}</div>
                        </div>
                        <div className={"source-dot " + src.status} />
                      </div>
                    );
                  })}
                  <div style={{ marginTop: 8 }}>
                    <Btn
                      kind="ghost"
                      size="sm"
                      leading={<Icon.Plus size={12} />}
                    >
                      Add source
                    </Btn>
                  </div>
                </>
              )}

              {activeTab === "chat" && (
                <>
                  <div className="rp-section-label">Chat history</div>
                  {CHAT_MSGS.map((msg, i) => (
                    <div key={i}>
                      {i > 0 && <div className="chat-msg-sep" />}
                      <div className="chat-msg">
                        <div
                          className={
                            "chat-msg-role" +
                            (msg.role === "ai" ? " is-ai" : "")
                          }
                        >
                          {msg.role === "ai" ? "RequireX" : "You"}
                        </div>
                        <div className="chat-msg-text">{msg.text}</div>
                      </div>
                    </div>
                  ))}
                </>
              )}

              {activeTab === "revisions" && (
                <>
                  <div className="rp-section-label">Revision history</div>
                  <div className="rev-tree">
                    {REVISIONS.map((rev) => (
                      <div key={rev.id} className="rev-node">
                        <div className="rev-dot-col">
                          <div
                            className={
                              "rev-dot" + (rev.active ? " is-active" : "")
                            }
                          />
                          <div className="rev-line" />
                        </div>
                        <div className="rev-info">
                          <div
                            className={
                              "rev-label" + (rev.active ? " is-active" : "")
                            }
                          >
                            {rev.label}
                          </div>
                          <div className="rev-meta">{rev.time}</div>
                          <div className="rev-msg">{rev.msg}</div>
                        </div>
                      </div>
                    ))}
                  </div>
                </>
              )}
            </div>
          </aside>
        );
      };
      window.RightPane = RightPane;
    </script>

          <span style={{ color: "var(--success)" }}>●</span>
          <span>6 / 6 linked</span>
          <div className="statusbar-grow" />
          {selectedReq && (

              <span className="statusbar-sep">·</span>

          <span>main</span>
          <span className="statusbar-sep">·</span>
          <span>UTF-8</span>
          <span className="statusbar-sep">·</span>
          <span>spec/v2.1</span>

      const CommandPalette = ({ onClose }) => {
        const [q, setQ] = useAppSt("");
        const cmds = [
          { icon: "Upload", label: "Add source" },
          { icon: "Refresh", label: "Re-extract requirements" },
          { icon: "Download", label: "Export as PDF" },
          { icon: "Share", label: "Share with client" },
          { icon: "History", label: "View revision history" },
          { icon: "Cog", label: "Project settings" },
        ];
        const items = cmds.filter(
          (c) => !q || c.label.toLowerCase().includes(q.toLowerCase()),
        );
        return (
          <div className="pal-scrim" onClick={onClose}>
            <div className="pal" onClick={(e) => e.stopPropagation()}>
              <div className="pal-input-row">
                <Icon.Search size={14} />
                <input
                  autoFocus
                  placeholder="Search commands…"
                  value={q}
                  onChange={(e) => setQ(e.target.value)}
                  onKeyDown={(e) => e.key === "Escape" && onClose()}
                />
                <Kbd>Esc</Kbd>
              </div>
              <div className="pal-body">
                <div className="pal-section">
                  <div className="pal-heading">Commands</div>
                  {items.map((cmd, i) => {
                    const I = Icon[cmd.icon];
                    return (
                      <button
                        key={i}
                        className={"pal-row" + (i === 0 ? " is-active" : "")}
                        onClick={onClose}
                      >
                        {I && <I size={14} />}
                        <span className="pal-label">{cmd.label}</span>
                      </button>
                    );
                  })}
                </div>
              </div>
            </div>
          </div>
        );
      };

      const AppShell = () => {
        const [sidebarOpen, setSidebarOpen] = useAppSt(true);
        const [rightOpen, setRightOpen] = useAppSt(false);
        const [theme, setTheme] = useAppSt("dark");
        const [palOpen, setPalOpen] = useAppSt(false);
        const [activeProj, setActiveProj] = useAppSt("p1");
        const [activeChat, setActiveChat] = useAppSt("c1");
        const [rightTab, setRightTab] = useAppSt("sources");
        const [selectedReq, setSelectedReq] = useAppSt(null);

        useAppEff(() => {
          document.documentElement.setAttribute("data-theme", theme);
        }, [theme]);

        useAppEff(() => {
          const h = (e) => {
            if ((e.metaKey || e.ctrlKey) && e.key === "k") {
              e.preventDefault();
              setPalOpen((p) => !p);
            }
            if (e.key === "Escape") setPalOpen(false);
          };
          window.addEventListener("keydown", h);
          return () => window.removeEventListener("keydown", h);
        }, []);

        const bodyClass = [
          "app-body",
          !sidebarOpen ? "sidebar-closed" : "",
          rightOpen ? "right-open" : "",
        ]
          .filter(Boolean)
          .join(" ");

        return (
          <div className="app-shell">
            <TitleBar
              sidebarOpen={sidebarOpen}
              rightOpen={rightOpen}
              theme={theme}
              onToggleSidebar={() => setSidebarOpen((p) => !p)}
              onToggleRight={() => setRightOpen((p) => !p)}
              onToggleTheme={() =>
                setTheme((t) => (t === "dark" ? "light" : "dark"))
              }
              onOpenPalette={() => setPalOpen(true)}
            />
            <div className={bodyClass}>
              {sidebarOpen && (
                <ProjectSidebar
                  activeProject={activeProj}
                  activeChat={activeChat}
                  onSelectProject={setActiveProj}
                  onSelectChat={setActiveChat}
                />
              )}
              <DocView
                selectedReq={selectedReq}
                onSelectReq={(id) =>
                  setSelectedReq(id === selectedReq ? null : id)
                }
              />
              {rightOpen && (
                <RightPane activeTab={rightTab} onTabChange={setRightTab} />
              )}
            </div>
            <StatusBar selectedReq={selectedReq} />
            {palOpen && <CommandPalette onClose={() => setPalOpen(false)} />}
          </div>
        );
      };

      ReactDOM.createRoot(document.getElementById("root")).render(<AppShell />);
    </script>
  </body>
</html>
