<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8"/>
<title>RequireX — Client review · payments-v2</title>
<link rel="icon" href="../../assets/favicon.svg"/>
<link rel="stylesheet" href="kit.css"/>
<style>
/* Client doc view — minimal, doc-first. Right rail shows version tree only. */
html, body { background: #fafaf7; }
[data-theme="dark"] body { background: var(--bg-app); }

.client {
  display: grid;
  grid-template-rows: 52px 1fr 36px;
  height: 100vh;
}

/* Top bar — share-link banner */
.cb {
  display: flex; align-items: center; gap: 12px;
  padding: 0 20px;
  border-bottom: 1px solid var(--border-1);
  background: var(--bg-app);
}
.cb-brand { display: flex; align-items: center; gap: 10px; }
.cb-brand .name { font-size: 14px; font-weight: 500; }
.cb-share { display: inline-flex; align-items: center; gap: 6px; height: 22px; padding: 0 8px; border-radius: 4px; background: var(--bg-surface-1); border: 1px solid var(--border-1); font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); }
.cb-share svg { color: var(--fg-4); }
.cb-grow { flex: 1; }
.cb-meta { display: flex; align-items: center; gap: 14px; font-size: 12px; color: var(--fg-3); }
.cb-meta b { color: var(--fg-1); font-weight: 500; }
.cb-actions { display: flex; gap: 6px; align-items: center; }

/* Body — doc + thin right rail */
.cbody { display: grid; grid-template-columns: 1fr 280px; min-height: 0; background: var(--bg-app); }
.cdoc-wrap { overflow: auto; padding: 36px 0 100px; }
.cdoc {
  max-width: 720px;
  margin: 0 auto;
  padding: 0 32px;
  font-family: var(--font-sans);
  font-size: 14.5px;
  line-height: 1.75;
  color: var(--fg-1);
}
.cdoc h1 { font-size: 32px; font-weight: 500; letter-spacing: -0.02em; margin: 0 0 4px; line-height: 1.15; }
.cdoc .lede { color: var(--fg-3); font-size: 14px; margin: 0 0 32px; }
.cdoc h2 { font-size: 20px; font-weight: 500; letter-spacing: -0.01em; margin: 36px 0 12px; padding-bottom: 6px; border-bottom: 1px solid var(--border-1); }
.cdoc h3 { font-size: 14px; font-weight: 500; color: var(--fg-1); margin: 20px 0 6px; font-family: var(--font-mono); letter-spacing: 0; }
.cdoc h3 .rid { color: var(--fg-4); margin-right: 8px; }
.cdoc p { margin: 0 0 14px; color: var(--fg-1); }
.cdoc p.req-text { padding-left: 12px; border-left: 2px solid var(--border-1); color: var(--fg-2); }

/* Front matter */
.cdoc .frontmatter {
  display: grid; grid-template-columns: auto 1fr; gap: 4px 18px;
  padding: 14px 18px;
  border: 1px solid var(--border-1);
  border-radius: var(--r-3);
  background: var(--bg-surface-1);
  font-family: var(--font-mono); font-size: 11.5px;
  margin: 24px 0 32px;
}
.cdoc .frontmatter dt { color: var(--fg-4); margin: 0; }
.cdoc .frontmatter dd { color: var(--fg-2); margin: 0; }

/* Inline question — needs answer from client */
.qask {
  margin: 12px 0 18px;
  border: 1px dashed rgba(212,163,86,0.45);
  border-radius: var(--r-3);
  padding: 14px 16px;
  background: rgba(212,163,86,0.05);
  display: flex; flex-direction: column; gap: 10px;
}
.qask .qhead { display: flex; align-items: center; gap: 8px; font-size: 11px; color: var(--warning); font-weight: 500; text-transform: uppercase; letter-spacing: 0.06em; }
.qask .qhead .qid { color: var(--fg-4); font-family: var(--font-mono); margin-left: auto; text-transform: none; letter-spacing: 0; }
.qask .qbody { font-size: 13.5px; line-height: 1.6; color: var(--fg-1); }
.qask textarea { width: 100%; min-height: 56px; resize: vertical; background: var(--bg-app); border: 1px solid var(--border-2); border-radius: var(--r-2); padding: 8px 10px; font-family: var(--font-sans); font-size: 13px; color: var(--fg-1); outline: none; }
.qask textarea:focus { border-color: var(--accent); }
.qask .qfoot { display: flex; gap: 6px; justify-content: flex-end; }
.qask.is-answered { background: rgba(126,180,134,0.05); border-color: rgba(126,180,134,0.35); border-style: solid; }
.qask.is-answered .qhead { color: var(--success); }

/* Inline comment — VS Code-style */
.cmt {
  margin: 8px 0 14px;
  border: 1px solid var(--border-2);
  border-left: 2px solid var(--info);
  border-radius: 0 var(--r-3) var(--r-3) 0;
  background: var(--bg-surface-1);
  padding: 10px 12px;
  display: flex; flex-direction: column; gap: 8px;
}
.cmt-thread { display: flex; flex-direction: column; gap: 8px; }
.cmt-msg { display: flex; gap: 10px; }
.cmt-av { width: 22px; height: 22px; border-radius: 50%; background: var(--bg-surface-3); display: grid; place-items: center; font-family: var(--font-mono); font-size: 10px; color: var(--fg-1); border: 1px solid var(--border-1); flex-shrink: 0; }
.cmt-av.is-client { background: rgba(122,155,184,0.20); border-color: rgba(122,155,184,0.40); color: #b4c8da; }
.cmt-bod { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 2px; }
.cmt-meta { font-family: var(--font-mono); font-size: 10.5px; color: var(--fg-4); display: flex; gap: 8px; }
.cmt-meta b { color: var(--fg-2); font-weight: 500; }
.cmt-text { font-size: 12.5px; color: var(--fg-1); line-height: 1.55; }
.cmt-quote { font-size: 11.5px; color: var(--fg-3); padding: 4px 8px; border-left: 2px solid var(--border-2); background: var(--bg-app); border-radius: 0 var(--r-2) var(--r-2) 0; font-style: italic; }
.cmt-reply { display: flex; gap: 8px; align-items: center; padding-left: 32px; }
.cmt-reply input { flex: 1; height: 26px; background: var(--bg-app); border: 1px solid var(--border-1); border-radius: var(--r-2); padding: 0 10px; font-family: var(--font-sans); font-size: 12px; color: var(--fg-1); outline: none; }
.cmt-reply input:focus { border-color: var(--accent); }

/* Inline-edit suggestion (vscode-card style) */
.suggest {
  margin: 8px 0 14px;
  border: 1px solid var(--border-1);
  border-radius: var(--r-3);
  background: var(--bg-surface-1);
  overflow: hidden;
}
.suggest-head { display: flex; align-items: center; gap: 8px; padding: 6px 12px; font-family: var(--font-mono); font-size: 10.5px; color: var(--fg-3); border-bottom: 1px solid var(--border-1); background: var(--bg-app); }
.suggest-head .who { color: var(--fg-2); }
.suggest-head .ico { color: var(--info); }
.suggest-diff { padding: 8px 12px; font-family: var(--font-sans); font-size: 13px; line-height: 1.6; }
.suggest-diff .del { background: rgba(196,115,106,0.10); color: var(--fg-2); text-decoration: line-through; text-decoration-color: rgba(196,115,106,0.6); padding: 2px 4px; border-radius: 2px; display: inline; }
.suggest-diff .add { background: rgba(126,180,134,0.10); color: var(--fg-1); padding: 2px 4px; border-radius: 2px; display: inline; }
.suggest-foot { display: flex; gap: 6px; padding: 8px 12px; border-top: 1px solid var(--border-1); background: var(--bg-app); }

/* Highlightable phrase (where user can suggest edit) */
.amb { background: rgba(212,163,86,0.10); border-bottom: 1px dashed rgba(212,163,86,0.55); padding: 0 1px; cursor: default; }
.amb:hover { background: rgba(212,163,86,0.18); }

/* Right rail — version tree */
.crail { border-left: 1px solid var(--border-1); display: flex; flex-direction: column; min-width: 0; }
.crail-head { display: flex; align-items: center; gap: 8px; padding: 0 16px; height: 40px; border-bottom: 1px solid var(--border-1); }
.crail-head .ttl { font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--fg-3); font-weight: 500; }
.crail-head .ct { font-family: var(--font-mono); font-size: 11px; color: var(--fg-4); margin-left: auto; }
.crail-body { flex: 1; overflow: auto; padding: 6px 0; }

.tree { padding: 6px 12px; }
.commit { position: relative; display: grid; grid-template-columns: 26px 1fr; gap: 8px; padding: 8px 0; cursor: default; }
.commit .branch { position: relative; display: flex; justify-content: center; }
.commit .branch::before { content: ""; position: absolute; top: 0; bottom: 0; left: 50%; width: 1px; background: var(--border-2); transform: translateX(-50%); }
.commit:first-child .branch::before { top: 50%; }
.commit:last-child .branch::before { bottom: 50%; }
.commit .node { width: 9px; height: 9px; border-radius: 50%; background: var(--bg-app); border: 1.5px solid var(--fg-3); margin-top: 6px; z-index: 1; }
.commit.is-current .node { background: var(--accent); border-color: var(--accent); box-shadow: 0 0 0 3px rgba(203,155,111,0.18); }
.commit.is-merge .node { background: var(--info); border-color: var(--info); }
.commit:hover { background: var(--bg-surface-1); border-radius: var(--r-2); }
.commit .body { display: flex; flex-direction: column; gap: 2px; padding: 0 4px; }
.commit .title { font-size: 12.5px; color: var(--fg-1); font-weight: 500; }
.commit.is-current .title { color: var(--accent); }
.commit .sub { font-family: var(--font-mono); font-size: 10.5px; color: var(--fg-4); display: flex; gap: 6px; }
.commit .sub .auth { color: var(--fg-3); }
.commit .diff { display: flex; gap: 8px; font-family: var(--font-mono); font-size: 10px; margin-top: 2px; }
.commit .diff .add { color: var(--success); }
.commit .diff .del { color: var(--danger); }

/* Bottom action bar */
.cfoot {
  display: flex; align-items: center; gap: 10px;
  padding: 0 18px;
  border-top: 1px solid var(--border-1);
  background: var(--bg-surface-1);
  font-family: var(--font-mono); font-size: 10.5px;
  color: var(--fg-3);
}
.cfoot .progress { display: flex; align-items: center; gap: 8px; }
.cfoot .bar { width: 120px; height: 4px; background: var(--bg-surface-3); border-radius: 2px; overflow: hidden; }
.cfoot .bar > span { display: block; height: 100%; background: var(--accent); width: 66%; }
.cfoot .grow { flex: 1; }
.cfoot .pill { font-family: var(--font-sans); }

/* Selection toolbar (floating, on highlighted text) — purely visual */
.sel-tool {
  position: absolute;
  z-index: 60;
  display: flex; gap: 2px;
  padding: 4px;
  background: rgba(20,20,22,0.96);
  border: 1px solid var(--border-2);
  border-radius: var(--r-3);
  box-shadow: var(--shadow-e2);
}
.sel-tool button {
  background: transparent; border: none;
  height: 22px; padding: 0 8px;
  font-family: var(--font-sans); font-size: 11px;
  color: var(--fg-2);
  border-radius: 3px;
  cursor: default;
  display: inline-flex; align-items: center; gap: 5px;
}
.sel-tool button:hover { background: var(--bg-surface-2); color: var(--fg-1); }
.sel-tool .sep { width: 1px; height: 14px; background: var(--border-1); margin: 0 2px; align-self: center; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="icons.jsx"></script>
<script type="text/babel">
const { useState } = React;

// Extra icons
Object.assign(Icon, {
  Edit:    (p) => <svg width={p.size||16} height={p.size||16} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4z"/></svg>,
  Reply:   (p) => <svg width={p.size||16} height={p.size||16} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M9 17l-5-5 5-5"/><path d="M4 12h11a5 5 0 0 1 5 5v2"/></svg>,
  Branch:  (p) => <svg width={p.size||16} height={p.size||16} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="6" cy="5" r="2"/><circle cx="6" cy="19" r="2"/><circle cx="18" cy="12" r="2"/><path d="M6 7v10"/><path d="M18 10c0-2-1-4-4-4H8"/><path d="M18 14c0 2-1 4-4 4H8"/></svg>,
  Question:(p) => <svg width={p.size||16} height={p.size||16} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="9"/><path d="M9.5 9a2.5 2.5 0 1 1 4 2c-1 .5-1.5 1-1.5 2"/><circle cx="12" cy="17" r="0.6" fill="currentColor"/></svg>,
  Suggest: (p) => <svg width={p.size||16} height={p.size||16} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4l1.5 4.5L17 10l-4.5 1.5L11 16l-1.5-4.5L5 10l4.5-1.5z"/><path d="M19 17l.5 1.5L21 19l-1.5.5L19 21l-.5-1.5L17 19l1.5-.5z"/></svg>,
});

const App = () => {
  const [a3, setA3] = useState("");
  const [answered, setAnswered] = useState(false);

  return (
    <div className="client">
      <header className="cb">
        <div className="cb-brand">
          <Icon.Logo size={20}/>
          <span className="name">RequireX</span>
        </div>
        <span className="cb-share"><Icon.Link size={11}/> rqx.dev/r/payments-v2/v0.4.2-r1 · view-only + comment</span>
        <span className="cb-grow"/>
        <span className="cb-meta">
          <span>Shared with <b>you@globex.com</b></span>
          <span>·</span>
          <span>by <b>Eli Ng</b></span>
          <span>·</span>
          <span>2m ago</span>
        </span>
        <div className="cb-actions">
          <button className="btn btn-ghost btn-sm">Download .pdf</button>
          <button className="btn btn-primary btn-sm">Approve & sign</button>
        </div>
      </header>

      <div className="cbody">
        <div className="cdoc-wrap">
          <article className="cdoc">
            <h1>Payments-v2 — Requirements</h1>
            <p className="lede">Globex Payments engine, version 2 — requirements extracted and traced from 5 source documents. Please review, comment inline, and answer the open questions before signing.</p>

            <dl className="frontmatter">
              <dt>project</dt><dd>payments-v2</dd>
              <dt>document</dt><dd>v0.4.2 · rev 1</dd>
              <dt>prepared&nbsp;by</dt><dd>Eli Ng · RequireX</dd>
              <dt>shared&nbsp;with</dt><dd>Maya Foster (Globex), Sam Ortiz (Globex)</dd>
              <dt>review&nbsp;due</dt><dd>Fri, May 16, 2026</dd>
              <dt>status</dt><dd>23 requirements · 2 open questions · 4 comments</dd>
            </dl>

            <h2>1. Functional</h2>

            <h3><span className="rid">REQ-0140</span> Idempotent payments</h3>
            <p className="req-text">Every <code>POST&nbsp;/payments</code> MUST include an <b>Idempotency-Key</b> header. Duplicate keys within a 24-hour window return the original response without re-executing the side effect.</p>

            <h3><span className="rid">REQ-0141</span> Retry policy</h3>
            <p className="req-text">Retries on transient gateway errors (5xx, network) follow exponential backoff with full jitter, capped at <span className="amb">30 seconds and 6 attempts</span>.</p>

            <div className="cmt">
              <div className="cmt-thread">
                <div className="cmt-msg">
                  <div className="cmt-av is-client">MF</div>
                  <div className="cmt-bod">
                    <div className="cmt-meta"><b>Maya Foster</b><span>Globex · Risk</span><span>·</span><span>14m ago</span></div>
                    <div className="cmt-quote">"capped at 30 seconds and 6 attempts"</div>
                    <div className="cmt-text">Risk wants the cap raised to 60 s for the cross-border lane only. Domestic stays at 30 s. Can you split this into two requirements?</div>
                  </div>
                </div>
                <div className="cmt-msg">
                  <div className="cmt-av">EN</div>
                  <div className="cmt-bod">
                    <div className="cmt-meta"><b>Eli Ng</b><span>RequireX</span><span>·</span><span>4m ago</span></div>
                    <div className="cmt-text">Will split into REQ-0141a (domestic, 30 s) and REQ-0141b (cross-border, 60 s) on next revision.</div>
                  </div>
                </div>
              </div>
              <div className="cmt-reply">
                <Icon.Reply size={13}/>
                <input placeholder="Reply to Maya & Eli…" />
              </div>
            </div>

            <h3><span className="rid">REQ-0142</span> Latency SLO</h3>
            <p className="req-text">The payments handler must respond within <b>200 ms at the 99th percentile</b> under nominal load. Breaches escalate to the on-call within one minute.</p>

            <div className="qask">
              <div className="qhead">
                <Icon.Question size={12}/>
                <span>Open question — needs your answer</span>
                <span className="qid">Q-0003</span>
              </div>
              <div className="qbody">What's the agreed escalation ladder for breaches that <b>auto-resolve</b> before the 60s window? The RFP §3.4 implies "no escalation"; the kickoff call agreed on a Sev-3 audit entry.</div>
              {!answered ? (
                <>
                  <textarea placeholder="Your answer — will be cited as evidence on REQ-0142." value={a3} onChange={(e) => setA3(e.target.value)} />
                  <div className="qfoot">
                    <button className="btn btn-ghost btn-sm">Skip — leave for kickoff</button>
                    <button className="btn btn-primary btn-sm" onClick={() => a3.trim() && setAnswered(true)}>Submit answer</button>
                  </div>
                </>
              ) : (
                <div className="cmt-text">✓ Answer recorded · will be added as evidence to REQ-0142 in v0.4.3.</div>
              )}
            </div>

            <h2>2. Non-functional</h2>

            <h3><span className="rid">REQ-0143</span> Audit log retention</h3>
            <p className="req-text">All payment events are persisted to the audit log for <b>7 years</b> (regulatory). Deletion is denied for retention-locked rows.</p>

            <h3><span className="rid">REQ-0144</span> Throughput</h3>
            <p className="req-text">The system MUST sustain <span className="amb">2,400 requests per second</span> at peak with no more than 0.05% error rate.</p>

            <div className="suggest">
              <div className="suggest-head">
                <Icon.Suggest size={12} className="ico"/>
                <span><span className="who">Sam Ortiz</span> suggested an edit · 22m ago</span>
              </div>
              <div className="suggest-diff">
                The system MUST sustain&nbsp;
                <span className="del">2,400 requests per second</span>{" "}
                <span className="add">3,000 requests per second</span>
                &nbsp;at peak with no more than 0.05% error rate.
              </div>
              <div className="suggest-foot">
                <button className="btn btn-secondary btn-sm">Accept</button>
                <button className="btn btn-ghost btn-sm">Reject</button>
                <button className="btn btn-ghost btn-sm">Reply</button>
              </div>
            </div>

            <h2>3. Compliance</h2>

            <h3><span className="rid">REQ-0145</span> Cardholder data encryption</h3>
            <p className="req-text">Cardholder name and last-4 are encrypted using <b>customer-managed KMS keys</b>. Logs MUST scrub PAN entirely.</p>

            <h3><span className="rid">REQ-0146</span> ISO 26262 conformance</h3>
            <p className="req-text">The payments service is in scope for ISO 26262 ASIL-B; release artifacts include the safety case appendix.</p>

          </article>
        </div>

        <aside className="crail">
          <div className="crail-head">
            <Icon.Branch size={13}/>
            <span className="ttl">History</span>
            <span className="ct">5 versions</span>
          </div>
          <div className="crail-body">
            <div className="tree">
              {[
                { id: "v0.4.2", title: "Add JIRA-2491 to REQ-0142", auth: "eli", when: "2m", current: true, add: 1, del: 0 },
                { id: "v0.4.1", title: "Q-0003 raised: 60s breach window", auth: "system", when: "10m", merge: true, add: 1, del: 0 },
                { id: "v0.4.0", title: "Re-extract with kickoff transcript", auth: "eli", when: "10m", add: 4, del: 1 },
                { id: "v0.3.0", title: "Compliance pass — ISO 26262", auth: "mfoster", when: "yest", add: 7, del: 2 },
                { id: "v0.2.0", title: "Initial draft from RFP", auth: "eli", when: "2d", add: 18, del: 0 },
              ].map((c) => (
                <div className={"commit" + (c.current ? " is-current" : "") + (c.merge ? " is-merge" : "")} key={c.id}>
                  <span className="branch"><span className="node"/></span>
                  <div className="body">
                    <span className="title">{c.title}</span>
                    <span className="sub"><span className="mono">{c.id}</span> · <span className="auth">{c.auth}</span> · {c.when}</span>
                    <span className="diff"><span className="add">+{c.add}</span><span className="del">−{c.del}</span></span>
                  </div>
                </div>
              ))}
            </div>
          </div>
        </aside>
      </div>

      <footer className="cfoot">
        <span className="progress">
          <span>Review · 15 of 23 read</span>
          <span className="bar"><span/></span>
        </span>
        <span>·</span>
        <span>1 of 2 questions answered</span>
        <span>·</span>
        <span>3 unresolved comments</span>
        <span className="grow"/>
        <span>autosaves · last 4s ago</span>
      </footer>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
